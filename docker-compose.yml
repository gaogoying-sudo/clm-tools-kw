services:
  mysql:
    image: mysql:8.0
    container_name: clm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-clm_root_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-clm_review}
      MYSQL_USER: ${MYSQL_USER:-clm}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-clm_pass_2026}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-clm_root_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clm-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-clm}:${MYSQL_PASSWORD:-clm_pass_2026}@mysql:3306/${MYSQL_DATABASE:-clm_review}
      DEBUG: "true"
      use_mock_data: "true"
      ADMIN_TOKEN: ${ADMIN_TOKEN:-clm_admin_dev}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_DRY_RUN: "true"
      FEISHU_TEST_MODE: "true"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clm-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      VITE_API_URL: http://localhost:8001
    depends_on:
      - backend

volumes:
  mysql_data:
